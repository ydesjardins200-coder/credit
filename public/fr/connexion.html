<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connectez-vous à iBoost." />
  <title>Connexion — iBoost</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/brand/shield-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/brand/shield-192.png" />
  <link rel="apple-touch-icon" href="/assets/img/brand/shield-192.png" />
  <link rel="canonical" href="https://iboostcredit.netlify.app/fr/connexion.html" />
  <link rel="alternate" hreflang="en" href="https://iboostcredit.netlify.app/login.html" />
  <link rel="alternate" hreflang="fr" href="https://iboostcredit.netlify.app/fr/connexion.html" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body
  data-msg-enter-creds="Veuillez saisir votre courriel et votre mot de passe."
  data-msg-auth-unavailable="L'authentification n'est pas configurée. Réessayez dans un instant."
  data-msg-signing-in="Connexion en cours…"
  data-msg-submit="Se connecter"
  data-msg-generic-error="La connexion a échoué. Veuillez réessayer."
  data-account-path="/account.html">
  <header class="site-header">
    <div class="container">
      <a href="/fr/" class="logo" aria-label="Accueil iBoost">
        <img
          src="/assets/img/brand/logo-horizontal-80.png"
          srcset="/assets/img/brand/logo-horizontal-80.png 1x, /assets/img/brand/logo-horizontal-160.png 2x"
          alt="iBoost"
          width="232"
          height="80"
        />
      </a>
      <nav class="site-nav" aria-label="Navigation principale">
        <a href="/login.html" class="lang-switch" aria-label="Switch to English">🌐 EN</a>
        <a href="/fr/inscription.html" class="btn btn-ghost">Inscription</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <h1>Bon retour</h1>
      <p class="muted">Connectez-vous à votre compte iBoost.</p>

      <div class="signup-reassurance" role="note" style="margin-top:var(--space-2)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span><strong>Connexion sécurisée.</strong> Chiffrement TLS 256 bits de niveau bancaire.</span>
      </div>

      <div id="alert" hidden></div>

      <button type="button" class="btn btn-oauth" data-oauth="google">
        Continuer avec Google
      </button>
      <button type="button" class="btn btn-oauth" data-oauth="facebook" aria-disabled="true" disabled>
        Continuer avec Facebook
      </button>

      <div class="divider">ou</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Courriel</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
          Se connecter
        </button>
      </form>

      <p class="auth-footer">
        Vous n'avez pas de compte ? <a href="/fr/inscription.html">Inscription</a>
      </p>
    </div>
  </main>

  <script src="/assets/js/config.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/auth.js" defer></script>
  <script src="/assets/js/login.js" defer></script>
</body>
</html>
