<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to iBoost." />
  <title>Sign in — iBoost</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/brand/shield-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/brand/shield-192.png" />
  <link rel="apple-touch-icon" href="/assets/img/brand/shield-192.png" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo" aria-label="iBoost home">
        <img
          src="/assets/img/brand/logo-horizontal-80.png"
          srcset="/assets/img/brand/logo-horizontal-80.png 1x, /assets/img/brand/logo-horizontal-160.png 2x"
          alt="iBoost"
          width="232"
          height="80"
        />
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/fr/connexion.html" class="lang-switch" aria-label="Passer en français">🌐 FR</a>
        <a href="/signup.html" class="btn btn-ghost">Sign up</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="muted">Sign in to your iBoost account.</p>

      <div class="signup-reassurance" role="note" style="margin-top:var(--space-2)">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span><strong>Secure connection.</strong> Bank-level 256-bit TLS encryption.</span>
      </div>

      <div id="alert" hidden></div>

      <button type="button" class="btn btn-oauth" data-oauth="google">
        Continue with Google
      </button>
      <button type="button" class="btn btn-oauth" data-oauth="facebook" aria-disabled="true" disabled>
        Continue with Facebook
      </button>

      <div class="divider">or</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
          Sign in
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign up</a>
      </p>
    </div>
  </main>

  <script src="/assets/js/config.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/assets/js/auth.js" defer></script>
  <script src="/assets/js/login.js" defer></script>
</body>
</html>
