# Netlify configuration for iBoost frontend

[build]
  publish = "public"
  # Generate public/assets/js/config.js from Netlify environment variables.
  # SUPABASE_URL, SUPABASE_ANON_KEY, and API_BASE_URL must be set in the
  # Netlify dashboard under Site settings → Environment variables.
  command = """
    printf 'window.IBOOST_CONFIG = {\\n  SUPABASE_URL: "%s",\\n  SUPABASE_ANON_KEY: "%s",\\n  API_BASE_URL: "%s"\\n};\\n' "$SUPABASE_URL" "$SUPABASE_ANON_KEY" "$API_BASE_URL" > public/assets/js/config.js
  """

# SPA-style fallback: if you later add client-side routing, uncomment:
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# ---------------------------------------------------------------------------
# DEV MODE — NO CACHE ANYWHERE
# ---------------------------------------------------------------------------
# While we're iterating on the site, every browser (including Yan's and the
# partners') should always re-fetch every file from Netlify. This eliminates
# the need for hard-refresh after every push.
#
# Trade-off: every page load re-downloads every asset. That's fine for a
# low-traffic dev site but will hurt performance + bandwidth in production.
#
# BEFORE PUBLIC LAUNCH:
#   Restore aggressive caching per asset type. See
#   docs/LAUNCH_CHECKLIST.md section "Cache strategy before launch".
# ---------------------------------------------------------------------------

# Security headers + no-cache applied to ALL responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # DEV MODE: disable all caching. Remove these 3 lines before launch.
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"
    # Tighten CSP once you know all required origins (Supabase URL, API URL, etc.)
    # Content-Security-Policy = "default-src 'self'; ..."
