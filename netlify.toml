# Netlify configuration for iBoost frontend

[build]
  publish = "public"
  # Generate public/assets/js/config.js from Netlify environment variables.
  # SUPABASE_URL, SUPABASE_ANON_KEY, and API_BASE_URL must be set in the
  # Netlify dashboard under Site settings → Environment variables.
  command = """
    printf 'window.IBOOST_CONFIG = {\\n  SUPABASE_URL: "%s",\\n  SUPABASE_ANON_KEY: "%s",\\n  API_BASE_URL: "%s"\\n};\\n' "$SUPABASE_URL" "$SUPABASE_ANON_KEY" "$API_BASE_URL" > public/assets/js/config.js
  """

# SPA-style fallback: if you later add client-side routing, uncomment:
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Security headers applied to all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Tighten CSP once you know all required origins (Supabase URL, API URL, etc.)
    # Content-Security-Policy = "default-src 'self'; ..."

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
